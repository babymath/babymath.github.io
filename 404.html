<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #bigBox {
            width: 95vw;
            height: 95vw;
            max-width: 500px;
            max-height: 500px;
            position: relative;
            background-color: royalblue;
            border-radius: 10px;
            overflow: hidden;
        }

        #smallBox {
            width: 50px;
            height: 50px;
            background-color: yellow;
            position: absolute;
            cursor: pointer;
            border-radius: 5px;
            transition: top 0.3s ease, left 0.3s ease;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: black;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<h2> 404 error</h2>
<div id="errormsg">The page you're trying to access might be temporarily unavailable due to a technical issue, or the website might be down for maintenance or experiencing problems. Goto <a href="https://babymath.github.io/"><button> Home</button></a>.</div>
    <div id="bigBox">
        <div id="smallBox"></div>
    </div>
    <div id="result" class="hidden"></div>

    <script>
        const bigBox = document.getElementById("bigBox");
        const smallBox = document.getElementById("smallBox");
        const resultBox = document.getElementById("result");

        let clickCount = 0;
        let gameRunning = true;

        // Function to generate a random position within boundaries
        function moveSmallBox() {
            let maxX = bigBox.clientWidth - smallBox.clientWidth;
            let maxY = bigBox.clientHeight - smallBox.clientHeight;

            let randomX = Math.random() * maxX;
            let randomY = Math.random() * maxY;

            smallBox.style.left = `${randomX}px`;
            smallBox.style.top = `${randomY}px`;
        }

        // Initialize small box at a random position inside big box
        moveSmallBox();

        // Move small box when clicked
        smallBox.addEventListener("click", () => {
            if (!gameRunning) return;

            clickCount++;
            moveSmallBox();
        });

        // Stop the game after 10 seconds
        setTimeout(() => {
            gameRunning = false;
            resultBox.textContent = `Total Clicks: ${clickCount}`;
            resultBox.classList.remove("hidden");
        }, 10000);
    </script>

</body>
</html>
