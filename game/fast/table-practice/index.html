<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="setup-window" class="window">
    <h2 class="heading">Table Practice: Setup</h2>
    <div class="section">
      <h3>Select Number of Questions</h3>
      <div class="btnGroup">
        <button class="btnQuestion" data-questions="15">15 Questions</button>
        <button class="btnQuestion" data-questions="30">30 Questions</button>
        <button class="btnQuestion" data-questions="45">45 Questions</button>
        <button class="btnQuestion" data-questions="60">60 Questions</button>
      </div>
    </div>
    <div class="section">
      <h3>Select Time Limit</h3>
      <div class="btnGroup">
        <button class="btnTime" data-time="1">1 Minute</button>
        <button class="btnTime" data-time="2">2 Minutes</button>
        <button class="btnTime" data-time="3">3 Minutes</button>
        <button class="btnTime" data-time="4">4 Minutes</button>
      </div>
    </div>
  </div>

  <div id="game-container" class="window">
    <h2 class="heading">Table Practice: Game</h2>
    <div class="infoBar">
      <div>Best Score: <span id="bestScore">0</span></div>
      <div><span id="counterWord"></span> <span id="counter">0</span></div>
      <div id="leftTotal"></div>
    </div>
    <div id="questionInfo">
      <p id="question">Loading...</p>
    </div>
    <input type="number" id="answer" placeholder="Your Answer" autofocus />
    <button id="btnEnd" class="btnControl">End Game</button>
  </div>

  <div id="result-window" class="window">
    <h2 class="heading">Game Over</h2>
    <div class="resultInfo">
      <p>Best Score: <span id="bestScore1">0</span></p>
      <p>Your Score: <span id="yourScore">0</span></p>
      <p>Total Questions Attempted: <span id="totalQuestionsAttempted">0</span></p>
      <p>Total Time Taken: <span id="totalTimeTaken">0</span> seconds</p>
      <p id="newBestMessage" class="highlight-message"></p>
    </div>
    <button id="btnRestart" class="btnControl">Restart</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
