<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Comparison - BabyMath</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Game Menu -->
        <div id="menu">
            <h1>🔢 Number Comparison Game</h1>
            <p>Select a mode to start:</p>
            <button class="mode-btn" onclick="startGame('easy')">Easy Mode</button>
            <button class="mode-btn" onclick="startGame('hard')">Hard Mode</button>
            <p>Highest Score: <span id="highest-score">0</span></p>
        </div>

        <!-- Game Content -->
        <div id="game-content" style="display: none;">
            <div class="game-header">
                <span id="lives">❤️❤️❤️</span>
                <span id="question-no">Question: 1</span>
                <span id="timer">⏱️ 0s</span>
            </div>
            <div id="question-container"></div>
            <button id="end-game-btn" onclick="endGame()">End Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" style="display: none;">
            <h2>Game Over</h2>
            <p id="final-score"></p>
            <p id="total-time"></p>
            <p id="total-questions"></p>
            <button onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
          </html>
