<body>

    <div id="game-container">
        <div id="gameHeading">Lighting Sum</div>
        <div class="top-info">
            <div id="tf1">Best Score: <span id="bestScore">0</span></div>
            <div id="tf2">Timer (sec): <span id="timer">0</span></div>
        </div>
        <div id="question-info">
            <span id="questionCount">0</span> 
            <span id="question">Loading...</span>
        </div>
        <input type="number" id="answer" placeholder="Your Answer" autofocus>
        <button id="btn-end">End Game</button>
    </div>

    <div id="result-window" class="hidden">
        <div id="rw1">Game Over</div>
        <div>
            <span id="rw2">Best Score</span>
            <span id="bestScore1">0</span>
        </div>
        <div>
            <span id="rw3">Your Score</span>
            <span id="yourScore">0</span> 
        </div>
        <button id="btn-restart">Restart</button>
    </div>

    <script src="script.js"></script>
