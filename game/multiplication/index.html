<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="BabyMath">
    <meta name="description" content="BabyMath - A fun and interactive way for kids to practice multiplication. Improve math skills with different difficulty levels and game modes!">
    <meta name="keywords" content="math, multiplication, kids math, math games, learning, education, practice, baby math">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph (For Social Media Sharing) -->
    <meta property="og:title" content="BabyMath - Fun Multiplication Practice">
    <meta property="og:description" content="An interactive website for kids to improve multiplication skills with different levels and game modes!">
    <meta property="og:image" content="https://babymath.github.io/img/preview.png">
    <meta property="og:url" content="https://babymath.github.io">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BabyMath - Fun Multiplication Practice">
    <meta name="twitter:description" content="Practice multiplication with fun challenges and different difficulty levels!">
    <meta name="twitter:image" content="https://babymath.github.io/assets/preview.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://babymath.github.io/img/favicon.png">
    <title>Multiplication Practice | BabyMath</title>

	<link rel="stylesheet" href="../.pt/style1.css">
	<script src="script.js"></script>
   
</head>
<body>
	<h3 id="page-heading">Multiplication</h3>
    <div id="game-container">
        <div id="setup">
            <h2>Select Game Mode</h2>
            <label><input type="radio" name="mode" value="time" checked> Time Limit:</label>
            <br>
            <div class="time-buttons">
                <button onclick="setTimeLimit(60)">1 Min</button>
                <button onclick="setTimeLimit(120)">2 Min</button>
                <button onclick="setTimeLimit(180)">3 Min</button>
                <button onclick="setTimeLimit(240)">4 Min</button>
            </div>

            <br><br>
            
            <label><input type="radio" name="mode" value="questions"> Number of Questions:</label>
            <br>
            <div class="question-buttons">
                <button onclick="setQuestionLimit(15)">15 Questions</button>
                <button onclick="setQuestionLimit(30)">30 Questions</button>
                <button onclick="setQuestionLimit(45)">45 Questions</button>
                <button onclick="setQuestionLimit(60)">60 Questions</button>
            </div>

            <br><br>

            <h3>Select Question Type</h3>
            <select id="questionType">
		<option value="2x1">2-digit × 1-digit</option>                
		<option value="3x1">3-digit × 1-digit</option>
                <option value="2x2">2-digit × 2-digit</option>
            </select>
            <br><br>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game" class="hidden">
            <p id="status-bar"><span id="timer"></span> <span id="question-count"></span></p>
            <h2 id="question"></h2>
            <input type="text" id="answer" onkeydown="checkEnter(event)" placeholder="Enter your answer">
            <button onclick="submitAnswer()">Submit</button>
            <br>
            <button onclick="restartGame()">Restart Game</button>
        </div>

        <div id="result" class="hidden">
            <h2>Game Over!</h2>
            <p id="final-score"></p>
            <p id="final-time"></p>
            <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

</body>
</html>
