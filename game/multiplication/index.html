<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Practice multiplication with fun and interactive exercises. Choose time or question limits and improve your math skills!">
    <meta name="keywords" content="multiplication, math practice, math games, learning, BabyMath">
    <meta name="author" content="BabyMath">
    <title>Multiplication Practice | BabyMath</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
        }

        .hidden {
            display: none;
        }

        input, button, select {
            padding: 10px;
            font-size: 18px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        #error {
            color: red;
            font-weight: bold;
        }

        #game-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #status-bar {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="setup">
            <h2>Select Game Mode</h2>
            <label><input type="radio" name="mode" value="time" checked> Time Limit:</label>
            <br>
            <button onclick="setTimeLimit(60)">1 Min</button>
            <button onclick="setTimeLimit(120)">2 Min</button>
            <button onclick="setTimeLimit(180)">3 Min</button>
            <button onclick="setTimeLimit(240)">4 Min</button>
            <br><br>
            <label><input type="radio" name="mode" value="questions"> Number of Questions:</label>
            <br>
            <button onclick="setQuestionLimit(15)">15 Questions</button>
            <button onclick="setQuestionLimit(30)">30 Questions</button>
            <button onclick="setQuestionLimit(45)">45 Questions</button>
            <button onclick="setQuestionLimit(60)">60 Questions</button>
            <br><br>
            <h3>Select Question Type</h3>
            <select id="questionType">
                <option value="3x1">3-digit × 1-digit</option>
                <option value="2x2">2-digit × 2-digit</option>
            </select>
            <br><br>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game" class="hidden">
            <p id="status-bar"><span id="timer"></span> <span id="question-count"></span></p>
            <h2 id="question"></h2>
            <input type="number" id="answer" onkeydown="checkEnter(event)">
            <button onclick="submitAnswer()">Submit</button>
            <p id="error" class="hidden">Incorrect! Try again.</p>
            <br>
            <button onclick="restartGame()">Restart Game</button>
        </div>

        <div id="result" class="hidden">
            <h2>Game Over!</h2>
            <p id="final-score"></p>
            <p id="final-time"></p>
            <button onclick="restartGame()">Restart Game</button>
        </div>
    </div>

    <script>
        let correctAnswer, questionCount = 0, maxQuestions, timer, timeLeft, startTime, timeElapsed = 0;

        function setTimeLimit(seconds) {
            document.querySelector('input[name="mode"][value="time"]').checked = true;
            timeLeft = seconds;
        }

        function setQuestionLimit(questions) {
            document.querySelector('input[name="mode"][value="questions"]').checked = true;
            maxQuestions = questions;
        }

        function startGame() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');

            let mode = document.querySelector('input[name="mode"]:checked').value;
            let questionType = document.getElementById('questionType').value;

            if (mode === 'questions' && !maxQuestions) maxQuestions = 15;
            if (mode === 'time' && !timeLeft) timeLeft = 60;

            questionCount = 0;
            startTime = new Date();

            if (mode === "time") {
                document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;
                timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;
                    if (timeLeft <= 0) endGame();
                }, 1000);
            } else {
                // Start timer without displaying "Time Left"
                timeElapsed = 0;
                document.getElementById('timer').textContent = `Timer: ${timeElapsed}s`;
                timer = setInterval(() => {
                    timeElapsed++;
                    document.getElementById('timer').textContent = `Timer: ${timeElapsed}s`;
                }, 1000);
            }

            nextQuestion(questionType);
        }

        function nextQuestion(type) {
            questionCount++;
            let mode = document.querySelector('input[name="mode"]:checked').value;

            if (mode === "questions") {
                document.getElementById('question-count').textContent = `Questions Left: ${maxQuestions - questionCount}`;
            } else {
                document.getElementById('question-count').textContent = `Question: ${questionCount}`;
            }

            if (mode === "questions" && questionCount > maxQuestions) {
                return endGame();
            }

            let num1, num2;
            if (type === "3x1") {
                num1 = Math.floor(100 + Math.random() * 900);
                num2 = Math.floor(1 + Math.random() * 9);
            } else {
                num1 = Math.floor(10 + Math.random() * 90);
                num2 = Math.floor(10 + Math.random() * 90);
            }

            correctAnswer = num1 * num2;
            document.getElementById('question').textContent = `${num1} × ${num2} = ?`;
            document.getElementById('answer').value = '';
            document.getElementById('error').classList.add('hidden');
            document.getElementById('answer').focus();
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                submitAnswer();
            }
        }

        function submitAnswer() {
            let userAnswer = parseInt(document.getElementById('answer').value);
            if (userAnswer === correctAnswer) {
                nextQuestion(document.getElementById('questionType').value);
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function endGame() {
            clearInterval(timer);
            let totalTime = Math.round((new Date() - startTime) / 1000);
            document.getElementById('game').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-score').textContent = `Total Questions Answered: ${questionCount}`;
            document.getElementById('final-time').textContent = `Total Time Taken: ${totalTime} seconds`;
        }

        function restartGame() {
            clearInterval(timer);
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('game').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }
    </script>
</body>
                                                          </html>
