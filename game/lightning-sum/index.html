<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BabyMath - A fun and interactive math game for kids.">
  <meta name="keywords" content="BabyMath, math game, kids, interactive, fun">
  <meta name="author" content="babymath.github.io">
  <meta name="theme-color" content="#d2b48c">
  <title>⚡ Lightning Sum ⚡ - BabyMath</title>
  <link rel="stylesheet" href="game/game.css">
</head>
<body>
  <div id="game">
    <div id="header1">
      <h1>⚡ Lightning Sum ⚡</h1>
    </div>
    <div id="main1">
      <section id="setup1"">
          <div id="changeMode">
            <button id="timeMode1">Time Mode</button>
            <button id="questionMode1">Question Mode</button>
          </div>
          <div id="choseMode">
            <button class="mode1 timeMode" data-value="60">1 Minute</button>
            <button class="mode1 timeMode" data-value="120">2 Minute</button>
            <button class="mode1 timeMode" data-value="180">3 Minute</button>
            <button class="mode1 timeMode" data-value="240">4 Minute</button>
            <button class="mode1 questionMode" data-value="15">15 Question</button>
            <button class="mode1 questionMode" data-value="30">30 Question</button>
            <button class="mode1 questionMode" data-value="45">45 Question</button>
            <button class="mode1 questionMode" data-value="60">60 Question</button>
          </div>
          <div id="type1">
            <button class="typeOption" data-value="1digit">1 digit</button>
            <button class="typeOption" data-value="2digit">2 digit</button>
          </div>
          <div id="start1">
            <button  id="startGame" disabled>Start</button>
          </div>
      </section>
      <section id="play1" style="display: none;">  
        <div id="line1">
          <span id="time1">0</span>
          <span id="question1">0</span>
        </div>
        <div id="line2">
          <p id="questionText">0 - 0 =</p>
        </div>
        <div id="line3">
          <input type="number" id="answer1" autocomplete="off" autofocus>
        </div>
        <div id="line4">
          <button id="submit1">Submit</button>
        </div>
      </section>
      <section id="gameover1" style="display: none;">
        <div id="endMessage">Game Over</div>
        <div id="totalTime">0</div>
        <div id="totalQuestion">0</div>
        <div id="score1">0</div>
        <div id="return1">
          <button id="playAgain">Play Again</button>
          <button id="backToSetup">Go To Setup</button>
        </div>
      </section>
    </div>
    <div id="footer1">BabyMath</div>
  </div>
  <script src="game/game1.js"></script>
  <script src="game/game2.js"></script>
</body>
</html>
