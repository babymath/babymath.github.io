<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swipe Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e0e0e0;
        }

        .container {
            position: relative;
            width: 400px;
            overflow: hidden;
        }

        .card-container {
            display: flex;
            transition: transform 0.3s ease-in-out;
            will-change: transform;
        }

        .card {
            min-width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #prevBtn {
            left: 10px;
        }

        #nextBtn {
            right: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="card-container">
            <div class="card" data-link="https://example.com/1">Link 1</div>
            <div class="card" data-link="https://example.com/2">Link 2</div>
            <div class="card" data-link="https://example.com/3">Link 3</div>
            <div class="card" data-link="https://example.com/4">Link 4</div>
            <div class="card" data-link="https://example.com/5">Link 5</div>
            <div class="card" data-link="https://example.com/6">Link 6</div>
            <div class="card" data-link="https://example.com/7">Link 7</div>
        </div>
        <button id="prevBtn">←</button>
        <button id="nextBtn">→</button>
    </div>

    <script>
        const cardsContainer = document.querySelector(".card-container");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        let index = 0;
        const totalCards = document.querySelectorAll(".card").length;

        function updateCards() {
            const offset = -index * 400;
            cardsContainer.style.transform = `translateX(${offset}px)`;
        }

        prevBtn.addEventListener("click", () => {
            if (index > 0) {
                index--;
                updateCards();
            }
        });

        nextBtn.addEventListener("click", () => {
            if (index < totalCards - 1) {
                index++;
                updateCards();
            }
        });

        // Swipe Gesture Support
        let startX = 0;
        let endX = 0;

        cardsContainer.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });

        cardsContainer.addEventListener("touchmove", (e) => {
            endX = e.touches[0].clientX;
        });

        cardsContainer.addEventListener("touchend", () => {
            if (startX - endX > 50 && index < totalCards - 1) {
                index++;
            } else if (endX - startX > 50 && index > 0) {
                index--;
            }
            updateCards();
        });

        // Click Event for Cards
        document.querySelectorAll(".card").forEach(card => {
            card.addEventListener("click", () => {
                const link = card.getAttribute("data-link");
                const confirmOpen = confirm("Do you want to open this link?");
                if (confirmOpen) {
                    window.open(link, "_blank");
                }
            });
        });

    </script>
</body>
</html>
