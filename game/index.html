<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowing Swipe Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e0e0e0;
        }

        .container {
            position: relative;
            width: 400px;
            height: 320px;
            overflow: hidden;
        }

        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }

        .card {
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s ease-in-out;
        }

        button {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        #upBtn {
            top: 10px;
        }

        #downBtn {
            bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-container">
            <div class="card" data-link="https://example.com/1" style="z-index: 7;">Link 1</div>
            <div class="card" data-link="https://example.com/2" style="z-index: 6;">Link 2</div>
            <div class="card" data-link="https://example.com/3" style="z-index: 5;">Link 3</div>
            <div class="card" data-link="https://example.com/4" style="z-index: 4;">Link 4</div>
            <div class="card" data-link="https://example.com/5" style="z-index: 3;">Link 5</div>
            <div class="card" data-link="https://example.com/6" style="z-index: 2;">Link 6</div>
            <div class="card" data-link="https://example.com/7" style="z-index: 1;">Link 7</div>
        </div>
        <button id="upBtn">↑</button>
        <button id="downBtn">↓</button>
    </div>

    <script>
        const cards = document.querySelectorAll(".card");
        const upBtn = document.getElementById("upBtn");
        const downBtn = document.getElementById("downBtn");

        let index = 0;

        function updateCards() {
            cards.forEach((card, i) => {
                const position = i - index;
                card.style.transform = `translateY(${position * 100}%) scale(${1 - Math.abs(position) * 0.1})`;
                card.style.opacity = position === 0 ? "1" : "0.7";
            });
        }

        upBtn.addEventListener("click", () => {
            if (index > 0) {
                index--;
                updateCards();
            }
        });

        downBtn.addEventListener("click", () => {
            if (index < cards.length - 1) {
                index++;
                updateCards();
            }
        });

        // Swipe Gesture Support
        let startY = 0;
        let endY = 0;

        document.addEventListener("touchstart", (e) => {
            startY = e.touches[0].clientY;
        });

        document.addEventListener("touchmove", (e) => {
            endY = e.touches[0].clientY;
        });

        document.addEventListener("touchend", () => {
            if (startY - endY > 50 && index < cards.length - 1) {
                index++;
            } else if (endY - startY > 50 && index > 0) {
                index--;
            }
            updateCards();
        });

        // Click Event for Cards
        cards.forEach(card => {
            card.addEventListener("click", () => {
                const link = card.getAttribute("data-link");
                const confirmOpen = confirm("Do you want to open this link?");
                if (confirmOpen) {
                    window.open(link, "_blank");
                }
            });
        });

        // Initialize cards in the correct position
        updateCards();
    </script>
</body>
</html>
