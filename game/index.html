<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Swipe Cards with Fog & Light</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            overflow: hidden;
            position: relative;
        }

        /* Fog Effect */
        .fog {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0) 80%);
            filter: blur(30px);
            opacity: 0.4;
            animation: moveFog 6s infinite alternate ease-in-out;
        }

        @keyframes moveFog {
            0% { transform: translateX(-100px) translateY(-50px) scale(1); }
            100% { transform: translateX(100px) translateY(50px) scale(1.2); }
        }

        /* Light Glow Effect */
        .light-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            opacity: 0.5;
            animation: moveLight 8s infinite alternate ease-in-out;
        }

        @keyframes moveLight {
            0% { transform: translateX(-150px) translateY(-100px) scale(1); }
            100% { transform: translateX(150px) translateY(100px) scale(1.3); }
        }

        .container {
            position: relative;
            width: 450px;
            height: 320px;
            perspective: 1200px;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            position: absolute;
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s ease-in-out;
            transform-origin: right center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card:hover {
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
            transform: scale(1.05);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: rgba(255, 215, 0, 0.6);
            pointer-events: none;
            user-select: none;
            transition: opacity 0.3s ease;
        }

        .left-arrow {
            left: -60px;
        }

        .right-arrow {
            right: -60px;
        }
    </style>
</head>
<body>

    <!-- Fog and Light Effects -->
    <div class="fog"></div>
    <div class="light-glow"></div>

    <div class="container">
        <div class="arrow left-arrow">←</div>
        <div class="arrow right-arrow">→</div>

        <div class="card-container">
            <div class="card" data-link="https://example.com/1" style="z-index: 7;">Link 1</div>
            <div class="card" data-link="https://example.com/2" style="z-index: 6;">Link 2</div>
            <div class="card" data-link="https://example.com/3" style="z-index: 5;">Link 3</div>
            <div class="card" data-link="https://example.com/4" style="z-index: 4;">Link 4</div>
            <div class="card" data-link="https://example.com/5" style="z-index: 3;">Link 5</div>
            <div class="card" data-link="https://example.com/6" style="z-index: 2;">Link 6</div>
            <div class="card" data-link="https://example.com/7" style="z-index: 1;">Link 7</div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll(".card");
        let index = 0;
        const totalCards = cards.length;

        function updateCards() {
            cards.forEach((card, i) => {
                let position = (i - index + totalCards) % totalCards; // Looping logic
                
                if (position === 0) {
                    card.style.transform = `rotateY(0deg) translateX(0) scale(1)`;
                    card.style.opacity = "1";
                    card.style.zIndex = 10;
                } else if (position > 0) {
                    card.style.transform = `rotateY(${position * 30}deg) translateX(${position * 20}px) scale(${1 - position * 0.1})`;
                    card.style.opacity = "0.7";
                    card.style.zIndex = 10 - position;
                } else {
                    card.style.transform = `rotateY(${position * 30}deg) translateX(${position * 20}px) scale(${1 + position * 0.1})`;
                    card.style.opacity = "0.7";
                    card.style.zIndex = 10 + position;
                }
            });
        }

        // Swipe Gesture Support
        let startX = 0;
        let endX = 0;

        document.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchmove", (e) => {
            endX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", () => {
            if (startX - endX > 50) {
                index = (index + 1) % totalCards; // Move forward, loop to 0 after last
            } else if (endX - startX > 50) {
                index = (index - 1 + totalCards) % totalCards; // Move backward, loop to last
            }
            updateCards();
        });

        // Click Event for Cards
        cards.forEach(card => {
            card.addEventListener("click", () => {
                const link = card.getAttribute("data-link");
                const confirmOpen = confirm("Do you want to open this link?");
                if (confirmOpen) {
                    window.open(link, "_blank");
                }
            });
        });

        // Initialize cards in the correct position
        updateCards();
    </script>
</body>
</html>
