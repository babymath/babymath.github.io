<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Swipe/Grid Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: linear-gradient(45deg, #ff5733, #1e90ff, #ffa500);
            animation: backgroundColor 10s infinite alternate ease-in-out;
        }

        .container {
            position: relative;
            width: 450px;
            height: 320px;
            perspective: 1200px;
            overflow: hidden;
        }

        .circle-container {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .circle {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: bold;
            transition: background 0.3s, transform 0.3s;
        }

        .circle.active {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.3);
        }

        .circle.active::after {
            content: "";
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rippleEffect 1.2s infinite ease-out;
        }

        @keyframes rippleEffect {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease-in-out;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            position: absolute;
            transition: transform 0.5s ease-out, opacity 0.3s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        .grid-view {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .grid-view .card {
            width: 120px;
            height: 120px;
            position: relative;
            transform: none !important;
            opacity: 1 !important;
        }

        .toggle-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-button:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .swipe-message {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 10px;
            white-space: nowrap;
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <button class="toggle-button" onclick="toggleView()">Grid View</button>

    <div class="container">
        <div class="circle-container"></div> 
        <div class="card-container">
            <div class="card" data-link="https://example.com/1">1</div>
            <div class="card" data-link="https://example.com/2">2</div>
            <div class="card" data-link="https://example.com/3">3</div>
            <div class="card" data-link="https://example.com/4">4</div>
            <div class="card" data-link="https://example.com/5">5</div>
        </div>
    </div>

    <div class="swipe-message">Swipe left or right to explore</div>

    <script>
        const cardContainer = document.querySelector(".card-container");
        const cards = document.querySelectorAll(".card");
        let index = 0;
        let gridView = false;

        function updateCards() {
            if (gridView) return;
            cards.forEach((card, i) => {
                let position = (i - index + cards.length) % cards.length;
                let translateX = position * 20;
                let scale = 1 - Math.abs(position * 0.1);
                card.style.transform = `translateX(${translateX}px) scale(${scale})`;
                card.style.opacity = position === 0 ? "1" : "0.7";
                card.style.zIndex = cards.length - Math.abs(position);
            });

            document.querySelectorAll(".circle").forEach((circle, i) => {
                circle.classList.toggle("active", i === index);
            });
        }

        function toggleView() {
            gridView = !gridView;
            if (gridView) {
                cardContainer.classList.add("grid-view");
                document.querySelector(".toggle-button").textContent = "Swipe View";
            } else {
                cardContainer.classList.remove("grid-view");
                updateCards();
                document.querySelector(".toggle-button").textContent = "Grid View";
            }
        }

        let startX = 0, endX = 0;
        document.addEventListener("touchstart", (e) => startX = e.touches[0].clientX);
        document.addEventListener("touchmove", (e) => endX = e.touches[0].clientX);
        document.addEventListener("touchend", () => {
            if (gridView) return;
            if (startX - endX > 50) index = (index + 1) % cards.length;
            else if (endX - startX > 50) index = (index - 1 + cards.length) % cards.length;
            updateCards();
        });

        document.querySelector(".circle-container").innerHTML = Array(cards.length).fill().map((_, i) => `<div class="circle">${i+1}</div>`).join("");
        updateCards();
    </script>

</body>
</html>
