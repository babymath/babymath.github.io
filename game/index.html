<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Flip Swipe Cards (Left-Right)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e0e0e0;
        }

        .container {
            position: relative;
            width: 400px;
            height: 300px;
            perspective: 1200px;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.5s ease-in-out;
            transform-origin: right center;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            user-select: none;
        }

        .left-arrow {
            left: -50px;
        }

        .right-arrow {
            right: -50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="arrow left-arrow">←</div>
        <div class="arrow right-arrow">→</div>

        <div class="card-container">
            <div class="card" data-link="https://example.com/1" style="z-index: 7;">Link 1</div>
            <div class="card" data-link="https://example.com/2" style="z-index: 6;">Link 2</div>
            <div class="card" data-link="https://example.com/3" style="z-index: 5;">Link 3</div>
            <div class="card" data-link="https://example.com/4" style="z-index: 4;">Link 4</div>
            <div class="card" data-link="https://example.com/5" style="z-index: 3;">Link 5</div>
            <div class="card" data-link="https://example.com/6" style="z-index: 2;">Link 6</div>
            <div class="card" data-link="https://example.com/7" style="z-index: 1;">Link 7</div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll(".card");

        let index = 0;

        function updateCards() {
            cards.forEach((card, i) => {
                const position = i - index;
                
                if (position === 0) {
                    card.style.transform = `rotateY(0deg) translateX(0) scale(1)`;
                    card.style.opacity = "1";
                    card.style.zIndex = 10;
                } else if (position > 0) {
                    card.style.transform = `rotateY(${position * 30}deg) translateX(${position * 20}px) scale(${1 - position * 0.1})`;
                    card.style.opacity = "0.8";
                    card.style.zIndex = 10 - position;
                } else {
                    card.style.transform = `rotateY(${position * 30}deg) translateX(${position * 20}px) scale(${1 + position * 0.1})`;
                    card.style.opacity = "0.8";
                    card.style.zIndex = 10 + position;
                }
            });
        }

        // Swipe Gesture Support
        let startX = 0;
        let endX = 0;

        document.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchmove", (e) => {
            endX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", () => {
            if (startX - endX > 50 && index < cards.length - 1) {
                index++;
            } else if (endX - startX > 50 && index > 0) {
                index--;
            }
            updateCards();
        });

        // Click Event for Cards
        cards.forEach(card => {
            card.addEventListener("click", () => {
                const link = card.getAttribute("data-link");
                const confirmOpen = confirm("Do you want to open this link?");
                if (confirmOpen) {
                    window.open(link, "_blank");
                }
            });
        });

        // Initialize cards in the correct position
        updateCards();
    </script>
</body>
</html>
