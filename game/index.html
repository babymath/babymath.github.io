<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Swipe Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            animation: backgroundColor 10s infinite alternate ease-in-out;
        }

        @keyframes backgroundColor {
            0% { background: #ff5733; }
            50% { background: #1e90ff; }
            100% { background: #ffa500; }
        }

        .sparkle-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: sparkleAnimation 3s infinite ease-in-out;
        }

        @keyframes sparkleAnimation {
            0% { transform: scale(1) translateY(0px); opacity: 1; }
            50% { transform: scale(1.5) translateY(-50px); opacity: 0.5; }
            100% { transform: scale(1) translateY(-100px); opacity: 0; }
        }

        .container {
            position: relative;
            width: 450px;
            height: 320px;
            perspective: 1200px;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: grab;
            position: absolute;
            transition: transform 0.5s ease-out, opacity 0.3s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        .card:hover {
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
        }

        .swipe-message {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 10px;
            white-space: nowrap;
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="sparkle-container"></div>

    <div class="container">
        <div class="card-container">
            <div class="card" data-link="https://example.com/1">Link 1</div>
            <div class="card" data-link="https://example.com/2">Link 2</div>
            <div class="card" data-link="https://example.com/3">Link 3</div>
            <div class="card" data-link="https://example.com/4">Link 4</div>
            <div class="card" data-link="https://example.com/5">Link 5</div>
        </div>
    </div>

    <div class="swipe-message">Swipe left or right to explore</div>

    <script>
        const cards = document.querySelectorAll(".card");
        let index = 0;
        const totalCards = cards.length;
        let lastSwipeTime = 0;

        function updateCards() {
            cards.forEach((card, i) => {
                let position = (i - index + totalCards) % totalCards;
                let translateX = position * 20;
                let scale = 1 - Math.abs(position * 0.1);
                card.style.transform = `translateX(${translateX}px) scale(${scale})`;
                card.style.opacity = position === 0 ? "1" : "0.7";
                card.style.zIndex = totalCards - Math.abs(position);
            });
        }

        let startX = 0, endX = 0;
        document.addEventListener("touchstart", (e) => startX = e.touches[0].clientX);
        document.addEventListener("touchmove", (e) => endX = e.touches[0].clientX);
        document.addEventListener("touchend", () => {
            let now = Date.now();
            if (now - lastSwipeTime < 500) return;
            lastSwipeTime = now;
            if (startX - endX > 50) { index = (index + 1) % totalCards; updateCards(); }
            else if (endX - startX > 50) { index = (index - 1 + totalCards) % totalCards; updateCards(); }
        });

        cards.forEach(card => {
            card.addEventListener("click", () => {
                window.open(card.getAttribute("data-link"), "_blank");
            });
        });

        setInterval(() => {
            const sparkle = document.createElement("div");
            sparkle.classList.add("sparkle");
            sparkle.style.left = `${Math.random() * 100}vw`;
            sparkle.style.top = `${Math.random() * 100}vh`;
            sparkle.style.animationDuration = `${Math.random() * 3 + 2}s`;
            document.querySelector(".sparkle-container").appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 5000);
        }, 200);

        updateCards();
    </script>

</body>
</html>
