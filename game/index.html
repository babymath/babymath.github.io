<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Swipe Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            animation: backgroundColor 10s infinite alternate ease-in-out;
        }

        /* Background Color Animation */
        @keyframes backgroundColor {
            0% { background: #ff5733; }   /* Red */
            50% { background: #1e90ff; }  /* Blue */
            100% { background: #ffa500; } /* Orange */
        }

        /* Container */
        .container {
            position: relative;
            width: 450px;
            height: 320px;
            perspective: 1200px;
            overflow: hidden;
        }

        /* Fog Effect */
        .fog {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0) 80%);
            filter: blur(30px);
            opacity: 0.4;
            animation: moveFog 6s infinite alternate ease-in-out;
        }

        @keyframes moveFog {
            0% { transform: translateX(-100px) translateY(-50px) scale(1); }
            100% { transform: translateX(100px) translateY(50px) scale(1.2); }
        }

        /* Card Styles */
        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            position: absolute;
            transition: transform 0.5s ease-in-out, opacity 0.3s ease-in-out, z-index 0.2s ease-in-out;
            transform-origin: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card:hover {
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
            transform: scale(1.05);
        }

        /* Arrows */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: rgba(255, 215, 0, 0.7);
            cursor: pointer;
        }

        .left-arrow { left: -60px; }
        .right-arrow { right: -60px; }

        /* Swipe Message */
        .swipe-message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- Fog Effect -->
    <div class="fog"></div>

    <div class="container">
        <div class="arrow left-arrow">←</div>
        <div class="arrow right-arrow">→</div>

        <div class="card-container">
            <div class="card" data-link="https://example.com/1">Link 1</div>
            <div class="card" data-link="https://example.com/2">Link 2</div>
            <div class="card" data-link="https://example.com/3">Link 3</div>
            <div class="card" data-link="https://example.com/4">Link 4</div>
            <div class="card" data-link="https://example.com/5">Link 5</div>
        </div>
    </div>

    <div class="swipe-message">Swipe Left or Right</div>

    <script>
        const cards = document.querySelectorAll(".card");
        let index = 0;
        const totalCards = cards.length;

        function updateCards(direction) {
            cards.forEach((card, i) => {
                let position = (i - index + totalCards) % totalCards;
                let rotation = direction === "left" ? -position * 30 : position * 30;
                let translateX = direction === "left" ? -position * 20 : position * 20;
                let scale = 1 - Math.abs(position * 0.1);

                if (position === 0) {
                    card.style.transform = `rotateY(0deg) translateX(0) scale(1)`;
                    card.style.opacity = "1";
                    card.style.zIndex = 10;
                } else {
                    card.style.transform = `rotateY(${rotation}deg) translateX(${translateX}px) scale(${scale})`;
                    card.style.opacity = "0.7";
                    card.style.zIndex = 10 - Math.abs(position);
                }
            });
        }

        // Click to open link
        cards.forEach(card => {
            card.addEventListener("click", () => {
                if (!moved) {
                    const link = card.getAttribute("data-link");
                    if (confirm("Do you want to open this link?")) {
                        window.open(link, "_blank");
                    }
                }
            });
        });

        // Arrow Navigation
        document.querySelector(".left-arrow").addEventListener("click", () => {
            index = (index - 1 + totalCards) % totalCards;
            updateCards("left");
        });

        document.querySelector(".right-arrow").addEventListener("click", () => {
            index = (index + 1) % totalCards;
            updateCards("right");
        });

        // Touch Swipe Support
        let startX = 0, endX = 0, moved = false;

        document.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
            moved = false;
        });

        document.addEventListener("touchmove", (e) => {
            endX = e.touches[0].clientX;
            moved = true;
        });

        document.addEventListener("touchend", () => {
            if (moved) {
                if (startX - endX > 50) {
                    index = (index + 1) % totalCards;
                    updateCards("right");
                } else if (endX - startX > 50) {
                    index = (index - 1 + totalCards) % totalCards;
                    updateCards("left");
                }
            }
        });

        // Mouse Drag Support
        let isDragging = false;
        document.addEventListener("mousedown", (e) => { isDragging = true; startX = e.clientX; });
        document.addEventListener("mouseup", () => { isDragging = false; });
        document.addEventListener("mousemove", (e) => {
            if (isDragging) {
                if (startX - e.clientX > 50) index = (index + 1) % totalCards, updateCards("right");
                else if (startX - e.clientX < -50) index = (index - 1 + totalCards) % totalCards, updateCards("left");
                isDragging = false;
            }
        });

        // Initialize
        updateCards("right");
    </script>
</body>
</html>
