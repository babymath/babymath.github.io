<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Swipe Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            animation: backgroundColor 10s infinite alternate ease-in-out;
        }

        @keyframes backgroundColor {
            0% { background: #ff5733; }
            50% { background: #1e90ff; }
            100% { background: #ffa500; }
        }

        /* Sparkle Effect */
        .sparkle-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: sparkleAnimation 3s infinite ease-in-out;
        }

        @keyframes sparkleAnimation {
            0% { transform: scale(1) translateY(0px); opacity: 1; }
            50% { transform: scale(1.5) translateY(-50px); opacity: 0.5; }
            100% { transform: scale(1) translateY(-100px); opacity: 0; }
        }

        /* Card Container */
        .container {
            position: relative;
            width: 450px;
            height: 320px;
            perspective: 1200px;
            overflow: hidden;
        }

        /* Card Styles */
        .card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            position: absolute;
            transition: transform 0.5s ease-out, opacity 0.5s ease-in-out;
            transform-origin: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: white;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card button:hover {
            background: gold;
            color: black;
        }

        /* Swipe-to-Dismiss Effect */
        .dismiss-right {
            transform: translateX(300px) rotate(20deg);
            opacity: 0;
        }

        .dismiss-left {
            transform: translateX(-300px) rotate(-20deg);
            opacity: 0;
        }

        /* Progress Bar */
        .progress-container {
            position: absolute;
            bottom: 20px;
            width: 80%;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

    </style>
</head>
<body>

    <!-- Sparkling Effect -->
    <div class="sparkle-container"></div>

    <div class="container">
        <div class="card-container">
            <div class="card" data-link="https://example.com/1">Link 1 <button>Open</button></div>
            <div class="card" data-link="https://example.com/2">Link 2 <button>Open</button></div>
            <div class="card" data-link="https://example.com/3">Link 3 <button>Open</button></div>
            <div class="card" data-link="https://example.com/4">Link 4 <button>Open</button></div>
            <div class="card" data-link="https://example.com/5">Link 5 <button>Open</button></div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <script>
        const cards = document.querySelectorAll(".card");
        let index = 0;
        const totalCards = cards.length;
        const sparkleContainer = document.querySelector(".sparkle-container");

        function updateProgress() {
            document.querySelector(".progress-bar").style.width = `${((index + 1) / totalCards) * 100}%`;
        }

        function swipeCard(direction) {
            if (index >= totalCards) return;

            const card = cards[index];
            card.classList.add(direction === "right" ? "dismiss-right" : "dismiss-left");

            setTimeout(() => {
                card.remove();
                index++;
                updateProgress();
            }, 500);
        }

        let startX = 0, endX = 0;

        document.addEventListener("touchstart", (e) => startX = e.touches[0].clientX);
        document.addEventListener("touchmove", (e) => endX = e.touches[0].clientX);
        document.addEventListener("touchend", () => {
            if (startX - endX > 50) swipeCard("right");
            else if (endX - startX > 50) swipeCard("left");
        });

        document.querySelectorAll(".card button").forEach(button => {
            button.addEventListener("click", (e) => {
                e.stopPropagation();
                const card = e.target.closest(".card");
                window.open(card.getAttribute("data-link"), "_blank");
            });
        });

        // Sparkle Effect Optimization
        setInterval(() => {
            if (sparkleContainer.children.length > 50) return;

            const sparkle = document.createElement("div");
            sparkle.classList.add("sparkle");
            sparkle.style.left = `${Math.random() * 100}vw`;
            sparkle.style.top = `${Math.random() * 100}vh`;
            sparkle.style.animationDuration = `${Math.random() * 3 + 2}s`;
            sparkleContainer.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 5000);
        }, 200);

        updateProgress();
    </script>

</body>
</html>
