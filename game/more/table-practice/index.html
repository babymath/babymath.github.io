<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Practice</title>
    <style>
        /* Background styling */
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Game container */
        .game-container {
            width: 380px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
            color: black;
            transition: transform 0.3s;
        }
        .game-container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 28px;
            color: #ff5e62;
            margin-bottom: 15px;
        }

        /* Question styling */
        #question {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        /* Input field */
        input {
            width: 90%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ff5e62;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #ff758c;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit {
            background: #28a745;
            color: white;
        }
        .btn-end {
            background: #dc3545;
            color: white;
        }
        .btn-restart {
            background: #ffb400;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }

        /* Feedback text */
        #feedback {
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        /* Score styling */
        .stats {
            font-size: 16px;
            margin-top: 10px;
            color: #444;
        }

    </style>
</head>
<body>
<p class="stats"><strong>Best Score:</strong> <span id="bestScore">0</span></p>

    <div class="game-container">
        <h1>Multiplication Practice</h1>
        <div id="question">Loading...</div>
        <input type="number" id="answer" placeholder="Your Answer" autofocus>
        <button class="btn-submit" onclick="checkAnswer()">Submit</button>
        <button class="btn-end" onclick="endGame()">End Game</button>
        <p id="feedback"></p>
        <p class="stats"><strong>Questions Attempted:</strong> <span id="questionCount">0</span></p>
        <p class="stats"><strong>Time Elapsed:</strong> <span id="timer">0</span> seconds</p>
        <button id="restart" class="btn-restart" onclick="restartGame()" style="display:none;">Restart</button>
    </div>

    <script>
function saveHighScore(score) {
    let highScore = localStorage.getItem("highScore") || 0;
    if (score > highScore) {
        localStorage.setItem("highScore", score);
    }
}


function getHighScore() {
    return localStorage.getItem("highScore") || 0;
}





        let num1, num2, correctAnswer;
        let questionCount = 0;
        let startTime, totalTime = 0;
        let gameEnded = false;
        let timerInterval;

        function startGame() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            generateQuestion();
        }

        function generateQuestion() {
            if (gameEnded) return;

            num1 = Math.floor(Math.random() * 20) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = num1 * num2;

            document.getElementById("question").innerText = `${num1} × ${num2} = ?`;
            document.getElementById("answer").value = "";
            document.getElementById("feedback").innerText = "";
            document.getElementById("answer").focus();
        }

        function checkAnswer() {
            if (gameEnded) return;

            let userAnswer = document.getElementById("answer").value;

            if (userAnswer == correctAnswer) {
                questionCount++;
                document.getElementById("questionCount").innerText = questionCount;
                document.getElementById("feedback").innerText = "✅ Correct!";
                document.getElementById("feedback").style.color = "green";
                generateQuestion();
            } else {
                document.getElementById("feedback").innerText = "❌ Wrong! Try again.";
                document.getElementById("feedback").style.color = "red";
            }
        }

        function updateTimer() {
            if (!gameEnded) {
                totalTime = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById("timer").innerText = totalTime;
            }
        }

        function endGame() {
    gameEnded = true;
    clearInterval(timerInterval);

    // Save the highest score
    saveHighScore(questionCount);

        document.getElementById("question").innerText = "🎉 Game Over!";
    document.getElementById("feedback").innerText = 
        `Total Questions: ${questionCount}, Time: ${totalTime} seconds`;

    // Display best score
    document.getElementById("bestScore").innerText = getHighScore();
    document.getElementById("restart").style.display = "block";
document.getElementByClassName("game-container").style.display = "none";
}

// Display the best score when game starts
document.getElementById("bestScore").innerText = getHighScore();


        function restartGame() {
            gameEnded = false;
            questionCount = 0;
            totalTime = 0;
            document.getElementById("questionCount").innerText = "0";
            document.getElementById("timer").innerText = "0";
            document.getElementById("restart").style.display = "none";
            startGame();
        }

        // Handle Enter key for submitting answer
        document.getElementById("answer").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        startGame();
    </script>
</body>
  </html>
