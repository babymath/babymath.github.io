<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyMath - Number Comparison</title>
    <link rel="stylesheet" href="styles.css"> <!-- External CSS -->
</head>
<body>
    <!-- Timer -->
    <div id="timer">⏱️ Time: 0s</div>

    <!-- Main Container -->
    <div class="container">
        <div class="spacer"></div>
        <h1>🔢 Compare the Numbers</h1>
        <p>Select the correct symbol for each comparison.</p>

        <!-- Questions Section -->
        <form id="comparison-form"></form>

        <!-- Buttons -->
        <div class="btn-container">
            <button type="button" class="submit-btn" onclick="checkAnswers()">✅ Submit Answers</button>
            <button type="button" class="reset-btn" onclick="resetQuiz()">🔄 Reset</button>
        </div>

        <!-- Result Display -->
        <div id="result" aria-live="polite"></div>
    </div>

    <script src="script.js"></script> <!-- External JavaScript -->
</body>
</html>
