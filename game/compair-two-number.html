<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyMath - Number Comparison</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
            overflow-y: auto;
            max-height: 90vh;
            position: relative;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        p {
            color: #555;
            margin-bottom: 15px;
        }

        /* Fixed Timer */
        #timer {
            position: fixed;
            top: 10px;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* Question Layout */
        .question {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f9f9f9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .question span {
            flex: 1;
            text-align: center;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 5px;
        }

        .btn-group button {
            background-color: #e0e0e0;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-group button:hover {
            background-color: #d4d4d4;
            transform: scale(1.1);
        }

        .btn-group button.selected {
            background-color: #4CAF50;
            color: white;
            transform: scale(1.1);
        }

        /* Submit & Reset Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .submit-btn, .reset-btn {
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .submit-btn {
            background-color: #007BFF;
            color: white;
        }

        .submit-btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .reset-btn {
            background-color: #FF5722;
            color: white;
        }

        .reset-btn:hover {
            background-color: #E64A19;
            transform: scale(1.05);
        }

        /* Result */
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        /* Correct/Incorrect Feedback */
        .correct {
            border: 2px solid #4CAF50;
            background-color: #e8f5e9;
        }

        .incorrect {
            border: 2px solid #F44336;
            background-color: #ffebee;
        }

        /* Add spacing to prevent overlap with timer */
        .spacer {
            height: 50px;
        }
    </style>
</head>
<body>
    <div id="timer">⏱️ Time: 0s</div>

    <div class="container">
        <div class="spacer"></div>  <!-- Prevent overlap with fixed timer -->
        <h1>🔢 Compare the Numbers</h1>
        <p>Select the correct symbol for each comparison.</p>

        <form id="comparison-form"></form>

        <div class="btn-container">
            <button type="button" class="submit-btn" onclick="checkAnswers()">✅ Submit Answers</button>
            <button type="button" class="reset-btn" onclick="resetQuiz()">🔄 Reset</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        let timerInterval;
        let timeElapsed = 0;

        document.addEventListener("DOMContentLoaded", () => {
            generateQuestions();
            startTimer();
        });

        function startTimer() {
            clearInterval(timerInterval); // Clear any existing timers
            timeElapsed = 0; // Reset the timer
            const timerElement = document.getElementById('timer');

            timerInterval = setInterval(() => {
                timeElapsed++;
                timerElement.textContent = `⏱️ Time: ${timeElapsed}s`;
            }, 1000);
        }

        function generateQuestions() {
            const form = document.getElementById('comparison-form');
            form.innerHTML = ''; // Clear previous questions

            for (let i = 1; i <= 25; i++) {
                const num1 = Math.floor(Math.random() * 100);
                const num2 = Math.floor(Math.random() * 100);
                const correctAnswer = num1 > num2 ? '>' : num1 < num2 ? '<' : '=';

                const question = document.createElement('div');
                question.classList.add('question');
                question.setAttribute('data-answer', correctAnswer);
                question.innerHTML = `
                    <span>${i}. ${num1}</span>
                    <div class="btn-group">
                        <button type="button" onclick="selectAnswer(this, '>')">&gt;</button>
                        <button type="button" onclick="selectAnswer(this, '<')">&lt;</button>
                        <button type="button" onclick="selectAnswer(this, '=')">=</button>
                    </div>
                    <span>${num2}</span>
                `;
                form.appendChild(question);
            }
        }

        function selectAnswer(button, answer) {
            const questionDiv = button.closest('.question');

            // Remove 'selected' class from all buttons in the question
            questionDiv.querySelectorAll('button').forEach(btn => btn.classList.remove('selected'));

            // Add 'selected' class to the clicked button
            button.classList.add('selected');

            // Store the selected answer
            questionDiv.setAttribute('data-selected', answer);
        }

        function checkAnswers() {
            clearInterval(timerInterval); // Stop the timer
            const questions = document.querySelectorAll('.question');
            let score = 0;

            questions.forEach(question => {
                const correctAnswer = question.getAttribute('data-answer');
                const userAnswer = question.getAttribute('data-selected');

                // Remove previous feedback classes
                question.classList.remove('correct', 'incorrect');

                if (userAnswer === correctAnswer) {
                    score++;
                    question.classList.add('correct');
                } else {
                    question.classList.add('incorrect');
                }
            });

            // Display the result
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `🎯 You got <strong>${score}</strong> out of <strong>${questions.length}</strong> correct!<br>⏱️ Time Taken: <strong>${timeElapsed} seconds</strong>`;
        }

        function resetQuiz() {
            clearInterval(timerInterval); // Stop the current timer
            document.getElementById('result').innerHTML = ''; // Clear previous result
            generateQuestions(); // Regenerate new questions
            startTimer(); // Restart the timer
        }
    </script>
</body>
  </html>
