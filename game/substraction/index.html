<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtraction Practice Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>➖ Subtraction Practice Game ➖</h1>

        <!-- Setup Section -->
        <div id="setup">
            <p>Select Time Limit:</p>
            <button class="option time-option" data-time="15">15s</button>
            <button class="option time-option" data-time="30">30s</button>
            <button class="option time-option" data-time="45">45s</button>
            <button class="option time-option" data-time="60">1 min</button>

            <p>Select Total Questions:</p>
            <button class="option question-option" data-questions="5">5</button>
            <button class="option question-option" data-questions="10">10</button>
            <button class="option question-option" data-questions="15">15</button>

            <p>Select Minuend Digits:</p>
            <button class="option minuend-option" data-digits="1">1 Digit</button>
            <button class="option minuend-option" data-digits="2">2 Digits</button>

            <p>Select Subtrahend Digits:</p>
            <button class="option subtrahend-option" data-digits="1">1 Digit</button>
            <button class="option subtrahend-option" data-digits="2">2 Digits</button>

            <button id="start-game" style="display: none;">Start Game</button>
        </div>

        <!-- Game Section -->
        <div id="game" style="display: none;">
            <div id="timer"></div>
            <div id="remaining"></div>
            <div id="problem"></div>
            <input type="number" id="answer" placeholder="Enter your answer">
            <button id="submit">Submit</button>
            <button id="restart">⟳ Restart</button>
        </div>

        <!-- Result Section -->
        <div id="result" style="display: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
      </html>
