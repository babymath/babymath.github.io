<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Round Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 2s ease-in-out; /* Smooth background transition */
        }

        .clock {
            width: 80vw;
            height: 80vw;
            max-width: 80vh;
            max-height: 80vh;
            background: white;
            border-radius: 50%;
            border: 5px solid black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.3);
        }

        .hand {
            position: absolute;
            background: black;
            transform-origin: bottom;
            transition: transform 0.05s linear;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); /* 3D effect */
        }

        .hour-hand {
            width: 2%;
            height: 25%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .minute-hand {
            width: 1.5%;
            height: 35%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .second-hand {
            width: 1%;
            height: 40%;
            background: red;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .center-circle {
            width: 5%;
            height: 5%;
            background: black;
            border-radius: 50%;
            position: absolute;
            z-index: 2;
        }

        .number {
            position: absolute;
            font-size: calc(2vw + 1rem); /* Responsive font size */
            font-weight: bold;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        .tick {
            position: absolute;
            background: black;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="hand hour-hand"></div>
        <div class="hand minute-hand"></div>
        <div class="hand second-hand"></div>
        <div class="center-circle"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();

            const hourDeg = (hours % 12) * 30 + (minutes / 2);
            const minuteDeg = minutes * 6 + seconds * 0.1;
            const secondDeg = (seconds + milliseconds / 1000) * 6;

            document.querySelector('.hour-hand').style.transform = `translate(-50%, -100%) rotate(${hourDeg}deg)`;
            document.querySelector('.minute-hand').style.transform = `translate(-50%, -100%) rotate(${minuteDeg}deg)`;
            document.querySelector('.second-hand').style.transform = `translate(-50%, -100%) rotate(${secondDeg}deg)`;

            requestAnimationFrame(updateClock);
        }

        function positionNumbers() {
            const clock = document.querySelector('.clock');
            const clockRadius = clock.clientWidth / 2;
            const centerX = clock.clientWidth / 2;
            const centerY = clock.clientHeight / 2;

            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * (Math.PI / 6);
                const x = centerX + clockRadius * 0.75 * Math.cos(angle);
                const y = centerY + clockRadius * 0.75 * Math.sin(angle);

                const numberElem = document.createElement('div');
                numberElem.classList.add('number');
                numberElem.textContent = i;
                numberElem.style.left = `${x}px`;
                numberElem.style.top = `${y}px`;

                clock.appendChild(numberElem);
            }
        }

        function positionTicks() {
            const clock = document.querySelector('.clock');
            const clockRadius = clock.clientWidth / 2;

            for (let i = 0; i < 60; i++) {
                const angle = (i * 6) * (Math.PI / 180);
                const tick = document.createElement('div');
                tick.classList.add('tick');

                const isHourMark = i % 5 === 0;
                tick.style.width = isHourMark ? '3%' : '1%';
                tick.style.height = isHourMark ? '10%' : '5%';
                tick.style.background = isHourMark ? 'black' : 'gray';

                tick.style.position = 'absolute';
                tick.style.left = '50%';
                tick.style.top = '50%';
                tick.style.transformOrigin = 'center bottom';
                tick.style.transform = `translate(-50%, -100%) rotate(${i * 6}deg)`;

                clock.appendChild(tick);
            }
        }

        function updateBackground() {
            const hour = new Date().getHours();
            let bgColor;

            if (hour >= 5 && hour < 11) {
                bgColor = '#FFFAE3'; // Morning (light yellow)
            } else if (hour >= 11 && hour < 16) {
                bgColor = '#87CEEB'; // Noon (sky blue)
            } else if (hour >= 16 && hour < 19) {
                bgColor = '#FFD580'; // Afternoon (light orange)
            } else if (hour >= 19 && hour < 21) {
                bgColor = '#FF8C00'; // Evening (dark orange)
            } else {
                bgColor = '#1A237E'; // Night (dark blue)
            }

            document.body.style.backgroundColor = bgColor;
        }

        positionNumbers();
        positionTicks();
        updateClock();
        updateBackground();
        setInterval(updateBackground, 60000); // Check background change every minute
    </script>
</body>
</html>
