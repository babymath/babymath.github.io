<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Round Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }

        .clock {
            width: 80vw;
            height: 80vw;
            max-width: 80vh;
            max-height: 80vh;
            background: white;
            border-radius: 50%;
            border: 5px solid black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.3);
        }

        .hand {
            position: absolute;
            background: black;
            transform-origin: bottom;
            transition: all 0.05s ease-in-out;
        }

        .hour-hand {
            width: 2%;
            height: 25%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .minute-hand {
            width: 1.5%;
            height: 35%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .second-hand {
            width: 1%;
            height: 40%;
            background: red;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 5px;
        }

        .center-circle {
            width: 5%;
            height: 5%;
            background: black;
            border-radius: 50%;
            position: absolute;
            z-index: 2;
        }

        .number {
            position: absolute;
            font-size: 6vw;
            font-weight: bold;
            text-align: center;
        }

        /* Positioning numbers dynamically */
        .number-1 { top: 18%; left: 73%; }
        .number-2 { top: 30%; left: 85%; }
        .number-3 { top: 50%; left: 90%; }
        .number-4 { top: 70%; left: 85%; }
        .number-5 { top: 82%; left: 72%; }
        .number-6 { top: 87%; left: 50%; transform: translateX(-50%); }
        .number-7 { top: 82%; left: 28%; }
        .number-8 { top: 70%; left: 15%; }
        .number-9 { top: 50%; left: 10%; }
        .number-10 { top: 30%; left: 15%; }
        .number-11 { top: 18%; left: 28%; }
        .number-12 { top: 8%; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div class="clock">
        <div class="hand hour-hand"></div>
        <div class="hand minute-hand"></div>
        <div class="hand second-hand"></div>
        <div class="center-circle"></div>
        <!-- Clock Numbers -->
        <div class="number number-1">1</div>
        <div class="number number-2">2</div>
        <div class="number number-3">3</div>
        <div class="number number-4">4</div>
        <div class="number number-5">5</div>
        <div class="number number-6">6</div>
        <div class="number number-7">7</div>
        <div class="number number-8">8</div>
        <div class="number number-9">9</div>
        <div class="number number-10">10</div>
        <div class="number number-11">11</div>
        <div class="number number-12">12</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourDeg = (hours % 12) * 30 + (minutes / 2); // 30° per hour
            const minuteDeg = minutes * 6; // 6° per minute
            const secondDeg = seconds * 6; // 6° per second

            document.querySelector('.hour-hand').style.transform = `translate(-50%, -100%) rotate(${hourDeg}deg)`;
            document.querySelector('.minute-hand').style.transform = `translate(-50%, -100%) rotate(${minuteDeg}deg)`;
            document.querySelector('.second-hand').style.transform = `translate(-50%, -100%) rotate(${secondDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Initialize the clock immediately
    </script>
</body>
</html>
