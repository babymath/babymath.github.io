<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Moving Bubbles</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            background: linear-gradient(to bottom, #eef2ff, #cfd9ff);
            overflow: hidden;
        }

        .bubble-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .bubble {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            box-shadow: inset -3px -3px 8px rgba(255, 255, 255, 0.5),
                        inset 3px 3px 8px rgba(0, 0, 0, 0.2),
                        5px 5px 10px rgba(0, 0, 0, 0.3);
            opacity: 0.9;
            transition: transform 0.3s ease-in-out, opacity 1s ease;
            animation: float 6s infinite ease-in-out alternate, rotate 10s infinite linear;
            cursor: pointer;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-30px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .blue { background: radial-gradient(circle, #4fa3ff, #0057d9); }
        .red { background: radial-gradient(circle, #ff4f4f, #d90000); }

        .bubble:hover {
            transform: scale(1.2);
            background: radial-gradient(circle, #ffeb3b, #f57c00);
        }

        .bubble.clicked {
            background: radial-gradient(circle, #ff4f4f, #d90000);
            transform: scale(1.5);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bubble-container"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.querySelector(".bubble-container");

            // Get current day and month
            const currentDate = new Date();
            const day = currentDate.getDate();
            const month = currentDate.getMonth() + 1;

            function createBubble(value, colorClass) {
                const bubble = document.createElement("div");
                bubble.classList.add("bubble", colorClass);
                bubble.textContent = value;

                const size = Math.random() * (80 - 40) + 40; // Bubble size between 40px and 80px
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;

                let x = Math.random() * window.innerWidth * 0.9;
                let y = Math.random() * window.innerHeight * 0.9;
                bubble.style.left = `${x}px`;
                bubble.style.top = `${y}px`;

                // Random speed for bubble movement
                const speed = Math.random() * 3 + 2; // Speed between 2s and 5s

                // Make bubble bounce off the edges
                function bounceBubble() {
                    let newX = Math.random() * window.innerWidth * 0.9;
                    let newY = Math.random() * window.innerHeight * 0.9;
                    bubble.style.transform = `translate(${newX - x}px, ${newY - y}px)`;
                    x = newX;
                    y = newY;
                    bubble.style.transitionDuration = `${speed}s`;
                }

                // Click event for interaction
                bubble.addEventListener('click', function() {
                    bubble.classList.toggle('clicked');
                    setTimeout(() => {
                        bubble.classList.remove('clicked');
                    }, 500);
                });

                container.appendChild(bubble);

                setInterval(bounceBubble, 5000);
            }

            // Create bubbles for the current day (blue)
            for (let i = 0; i < day; i++) {
                setTimeout(() => createBubble(day, "blue"), i * 100);
            }

            // Create bubbles for the current month (red)
            for (let i = 0; i < month; i++) {
                setTimeout(() => createBubble(month, "red"), i * 300);
            }
        });
    </script>
</body>
</html>
