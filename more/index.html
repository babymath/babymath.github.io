<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More – BabyMath</title>
    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }

        /* Header */
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            font-size: 24px;
        }

        /* Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        /* Grid Items */
        .grid-item {
            background-color: white;
            padding: 40px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #4CAF50;
            border-radius: 5px;
            transition: transform 0.3s;
        }

        .grid-item:hover {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <a href="../"><h1>🏠</h1></a>
    </header>

    <div class="grid-container">
<a href="table-practice"><div class="grid-item">Table<br>Practice</div></a>
<a href="number-hunt"><div class="grid-item">Number<br>Hunt</div></a>
    <a href="comparison"><div class="grid-item">Number<br>Comparison<br>&lt; &gt; =</div></a>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>

    <footer>
        <p>© 2025 babymath</p>
    </footer>
</body>
  </html>
