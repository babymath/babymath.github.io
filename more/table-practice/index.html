<body>

    <div class="game-container">
        <h1>Table Practice</h1>

        <!-- Best Score -->
        <div class="top-info">
            <p><strong>Best Score:</strong> <span id="bestScore">0</span></p>
        </div>

        <div class="stats">
            <p><strong>Questions Attempted:</strong> <span id="questionCount">0</span>
            <strong>Time Elapsed:</strong> <span id="timer">0</span> seconds</p>
        </div>

        <!-- Question -->
        <div id="question">Loading...</div>

        <!-- Answer Input -->
        <input type="number" id="answer" placeholder="Your Answer" autofocus>

        <!-- End Game Button -->
        <button id="btn-end">End Game</button>
    </div>

    <!-- Result Window -->
    <div id="result-window" class="hidden">
        <h2>Game Over</h2>
        <p id="final-result"></p>
        <button id="btn-restart">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
