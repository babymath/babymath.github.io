<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Table Practice</h1>

    <div class="game-container" id="game-container">
        <div class="stats">
            <p><strong>Best Score:</strong> <span id="bestScore">0</span></p>
            <p><strong>Questions Attempted:</strong> <span id="questionCount">0</span></p>
            <p><strong>Time:</strong> <span id="timer">0</span> sec</p>
        </div>

        <p id="question">Loading...</p>
        <input type="number" id="answer" placeholder="Enter Answer">

        <div class="buttons">
            <button id="btn-end">End Game</button>
        </div>
    </div>

    <div id="result-window">
        <h2>Game Over</h2>
        <p id="final-result"></p>
        <button id="btn-restart">Restart</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
