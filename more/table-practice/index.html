<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Table Practice</h1>

        <!-- Best Score & Lives (One Line) -->
        <div class="top-info">
            <p><strong>Best Score:</strong> <span id="bestScore">0</span>
            <strong>Lives Left:</strong> <span id="lives"></span></p>
        </div>

        <div class="stats">
            <p><strong>Questions Attempted:</strong> <span id="questionCount">0</span>
            <strong>Time Elapsed:</strong> <span id="timer">0</span> seconds</p>
        </div>

        <!-- Question -->
        <div id="question">Loading...</div>

        <!-- Answer Input -->
        <input type="number" id="answer" placeholder="Your Answer" autofocus>

        <!-- End Game Button -->
        <button id="btn-end">End Game</button>

    </div>

    <!-- Result Window (Hidden by Default) -->
    <div id="result-window" class="hidden">
        <h2>Game Over</h2>
        <p id="final-result"></p>
        <button id="btn-restart">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
