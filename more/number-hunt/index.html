<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Hunt</title>
</head>
<body>
    <h1>Welcome to Number Hunt</h1>
    <p id="message"></p>

    <script type="module">
        async function loadAndRunTS() {
            const response = await fetch('index.ts'); // Fetch TypeScript file
            const tsCode = await response.text();

            const { transpileModule } = await import('https://cdn.jsdelivr.net/npm/typescript@latest/lib/typescript.js');
            const jsCode = transpileModule(tsCode, { compilerOptions: { module: "ESNext", target: "ES6" } }).outputText;

            eval(jsCode); // Execute the transpiled JavaScript
        }

        loadAndRunTS();
    </script>
</body>
</html>
