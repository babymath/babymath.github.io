<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Hunt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="timer-bar" id="timer-bar"></div>

    <div class="game-container">
        <h1>Click the Number: <span id="target-number">0</span></h1>
        <p class="score-text">Score: <span id="score">0</span></p>
        <p class="time-text">Time Left: <span id="timer">10</span>s</p>
        <div class="bubble-container" id="bubble-container"></div>
        <button id="restart-btn">Restart</button>
    </div>

    <div class="popup-container" id="popup">
        <div class="popup-content">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="final-score">0</span></p>
            <p>Highest Score: <span id="high-score">0</span></p>
            <button id="ok-btn">OK</button>
        </div>
    </div>

    <div class="floating-bubbles" id="floating-bubbles"></div>
    <script src="script.js"></script>
</body>
</html>
